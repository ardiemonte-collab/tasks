<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskEarner - Unlock Tasks</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        input { width: 85%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; text-align: center; }
        button { background: #1b1464; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 90%; font-weight: bold; }
        button:hover { background: #2e2482; }
        .status { margin-top: 15px; color: #666; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Unlock Premium Tasks</h2>
    <p>Pay KES 125 via M-Pesa to instantly unlock high-paying evaluation tasks.</p>
    
    <input type="tel" id="phone" placeholder="e.g., 254712345678" value="254">
    <button onclick="triggerPayment()">Pay KES 125 via M-Pesa</button>
    
    <div class="status" id="statusMessage"></div>
</div>

<script>
    async function triggerPayment() {
        const phone = document.getElementById('phone').value;
        const status = document.getElementById('statusMessage');
        
        if (phone.length < 12 || !phone.startsWith('254')) {
            status.innerText = "Please enter a valid phone number starting with 254";
            status.style.color = "red";
            return;
        }

        status.innerText = "Sending M-Pesa STK Push... Check your phone.";
        status.style.color = "orange";

        console.log("Initiating payment of KES 125 for phone: " + phone);
    }
</script>

</body>
</html>
